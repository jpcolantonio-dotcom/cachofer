<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CachoFer — Central</title>
<script sr// Mapa TV: todas las camionetas — refresh cada 5s, ruta desde depósito, leyenda
function AllDriversMap({drivers,stops,clients,depot,workDate,onClose,onRefresh}){
  const ref=useRef(null); const mapRef=useRef(null);
  const layersRef=useRef([]); const [tick,setTick]=useState(0);
  const [lastUp,setLastUp]=useState(new Date());

  function clearAll(map){ layersRef.current.forEach(l=>{try{map.removeLayer(l);}catch{}}); layersRef.current=[]; }

  function redraw(map,driversD,stopsD,clientsD,depotD){
    clearAll(map);
    const allPts=[];
    // Depósito
    if(depotD?.lat&&depotD?.lng){
      allPts.push([depotD.lat,depotD.lng]);
      const di=L.divIcon({className:"",html:`<div style="width:40px;height:40px;border-radius:10px;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;border:2.5px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.5)">🏭</div>`,iconSize:[40,40],iconAnchor:[20,20]});
      const dm=L.marker([depotD.lat,depotD.lng],{icon:di}).addTo(map).bindPopup(`<b>🏭 ${depotD.name||"Depósito"}</b><br><span style="font-size:11px">${depotD.address||""}</span>`);
      layersRef.current.push(dm);
    }
    driversD.forEach(dr=>{
      const color=dr.color||"#6366f1";
      const drvStops=[...stopsD.filter(s=>s.driver_id===dr.id&&s.work_date===workDate)].sort((a,b)=>a.route_order-b.route_order);
      if(!drvStops.length) return;
      // Ruta: empieza desde depósito
      const routePts=[];
      if(depotD?.lat&&depotD?.lng) routePts.push([depotD.lat,depotD.lng]);
      drvStops.forEach((s,i)=>{
        const c=clientsD.find(x=>x.id===s.client_id);
        if(!c?.lat||!c?.lng) return;
        routePts.push([c.lat,c.lng]);
        allPts.push([c.lat,c.lng]);
        const done=s.status==="entregado";
        const bg=done?"#10b981":color;
        const ic=L.divIcon({className:"",html:`<div style="width:28px;height:28px;border-radius:50%;background:${bg};color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);font-family:Inter,sans-serif">${done?"✓":i+1}</div>`,iconSize:[28,28],iconAnchor:[14,14]});
        const mk=L.marker([c.lat,c.lng],{icon:ic}).addTo(map).bindPopup(`<div style="font-family:Inter,sans-serif"><b style="color:${color}">${dr.name}</b><br>#${i+1} — ${c.name}<br><span style="font-size:11px">${c.address}</span><br><span style="color:${bg};font-size:11px">⏰ ${s.time_limit}${done?" · ✓ Entregado":""}</span></div>`);
        layersRef.current.push(mk);
      });
      if(routePts.length>1){
        const poly=L.polyline(routePts,{color,weight:3.5,dashArray:"8,5",opacity:.8}).addTo(map);
        layersRef.current.push(poly);
        // Etiqueta nombre chofer en primer punto de entrega
        const[lat,lng]=routePts[1]||routePts[0];
        const lbl=L.divIcon({className:"",html:`<div style="background:${color};color:#fff;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:700;font-family:Inter,sans-serif;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.3);border:1.5px solid #fff">${dr.name}</div>`,iconSize:[0,0],iconAnchor:[-4,14]});
        const lm=L.marker([lat,lng],{icon:lbl,interactive:false,zIndexOffset:500}).addTo(map);
        layersRef.current.push(lm);
      }
      // GPS del chofer en tiempo real
      if(dr.current_lat&&dr.current_lng){
        allPts.push([dr.current_lat,dr.current_lng]);
        const min=dr.location_updated_at?Math.round((Date.now()-new Date(dr.location_updated_at))/60000):null;
        const fresh=min!==null&&min<5;
        const ti=L.divIcon({className:"",html:`<div style="display:flex;flex-direction:column;align-items:center"><div style="width:44px;height:44px;border-radius:50%;background:${color};border:3px solid #fff;box-shadow:0 3px 14px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:22px;position:relative">🚛<div style="position:absolute;top:-2px;right:-2px;width:12px;height:12px;border-radius:50%;background:${fresh?"#10b981":"#f59e0b"};border:2px solid #fff;animation:${fresh?"pulse 2s infinite":"none"}"></div></div></div>`,iconSize:[44,44],iconAnchor:[22,22]});
        const tm=L.marker([dr.current_lat,dr.current_lng],{icon:ti,zIndexOffset:1000}).addTo(map)
          .bindPopup(`<div style="font-family:Inter,sans-serif"><b style="color:${color}">${dr.name}</b><br><span style="color:${fresh?"#10b981":"#f59e0b"};font-size:11px">${fresh?"🟢 En ruta":"🟡 Sin señal"}</span><br><span style="font-size:10px;color:#888">Hace ${min??"-"} min</span></div>`);
        layersRef.current.push(tm);
      }
    });
    if(allPts.length>0){ try{map.fitBounds(allPts.length===1?[allPts[0],allPts[0]]:allPts,{padding:[48,48],maxZoom:15});}catch{} }
    setLastUp(new Date());
  }

  useEffect(()=>{
    if(!ref.current) return;
    if(mapRef.current){mapRef.current.remove();mapRef.current=null;}
    const map=initMap(ref.current,[-34.61,-58.38],12);
    mapRef.current=map;
    redraw(map,drivers,stops,clients,depot);
    setTimeout(()=>map.invalidateSize(),150);
    return()=>{if(mapRef.current){mapRef.current.remove();mapRef.current=null;}};
  },[]);

  // Refresh cada 5 segundos
  useEffect(()=>{
    const iv=setInterval(async()=>{
      if(onRefresh) await onRefresh();
      if(mapRef.current) redraw(mapRef.current,drivers,stops,clients,depot);
    },5000);
    return()=>clearInterval(iv);
  },[drivers,stops,clients,depot,workDate]);

  useEffect(()=>{
    if(mapRef.current) redraw(mapRef.current,drivers,stops,clients,depot);
  },[stops,drivers]);

  const fmt=t=>`${t.getHours().toString().padStart(2,"0")}:${t.getMinutes().toString().padStart(2,"0")}:${t.getSeconds().toString().padStart(2,"0")}`;

  return(
    <div style={{position:"fixed",inset:0,background:"#111",zIndex:600,display:"flex",flexDirection:"column"}}>
      <div style={{height:56,background:"#0a0a0a",borderBottom:"1px solid #1f1f1f",display:"flex",alignItems:"center",padding:"0 20px",gap:14,flexShrink:0}}>
        <span style={{fontWeight:800,fontSize:15,color:"#fff",letterSpacing:-.3}}>CA-<span style={{color:"#f97316"}}>Chofer</span></span>
        <span style={{fontSize:11,color:"#444",background:"#181818",padding:"2px 8px",borderRadius:20}}>Vista TV</span>
        {/* Leyenda */}
        <div style={{display:"flex",gap:8,flexWrap:"wrap",flex:1}}>
          {drivers.filter(dr=>stops.some(s=>s.driver_id===dr.id&&s.work_date===workDate)).map(dr=>{
            const color=dr.color||"#6366f1";
            const cnt=stops.filter(s=>s.driver_id===dr.id&&s.work_date===workDate).length;
            const done=stops.filter(s=>s.driver_id===dr.id&&s.work_date===workDate&&s.status==="entregado").length;
            const isActive=dr.current_lat&&dr.location_updated_at&&Math.round((Date.now()-new Date(dr.location_updated_at))/60000)<5;
            return(
              <div key={dr.id} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 12px",borderRadius:20,border:`1.5px solid ${color}`,background:`${color}18`}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:color,animation:isActive?"pulse 2s infinite":"none"}}/>
                <span style={{fontSize:12,fontWeight:600,color:"#fff"}}>{dr.name}</span>
                <span style={{fontSize:11,color:"#666"}}>{done}/{cnt} ✓</span>
                {isActive&&<span style={{fontSize:10,color:"#10b981"}}>🟢</span>}
              </div>
            );
          })}
          <div style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:20,background:"#181818"}}>
            <span style={{width:8,height:8,borderRadius:2,background:"#111",border:"1px solid #555",display:"inline-block"}}/>
            <span style={{fontSize:11,color:"#555"}}>🏭 Depósito</span>
          </div>
        </div>
        <div style={{fontSize:11,color:"#333",fontFamily:"monospace"}}>{fmt(lastUp)}</div>
        <button onClick={onClose} style={{background:"#1a1a1a",border:"1px solid #333",borderRadius:8,padding:"6px 14px",color:"#fff",fontSize:12,fontWeight:500,cursor:"pointer"}}>✕ Cerrar</button>
      </div>
      <div ref={ref} style={{flex:1}}/>
    </div>
  );
}
