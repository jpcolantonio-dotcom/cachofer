async function dbGet(table, filters={}, orderBy=null){
  let url = SUPA_URL+"/rest/v1/"+table+"?select=*";
  Object.entries(filters).forEach(([k,v])=>{ url+="&"+k+"=eq."+encodeURIComponent(v); });
  if(orderBy) url+="&order="+orderBy+".asc";
  const r = await fetch(url,{method:"GET",headers:HG});
  const d = await r.json();
  return {data:Array.isArray(d)?d:[],error:r.ok?null:d};
}
async function dbUpdate(table, data, col, val){
  const r = await fetch(SUPA_URL+"/rest/v1/"+table+"?"+col+"=eq."+encodeURIComponent(val),{method:"PATCH",headers:HW,body:JSON.stringify(data)});
  const d = await r.json();
  return {data:d,error:r.ok?null:d};
}

const todayStr = () => new Date().toISOString().slice(0,10);
const PC = {urgente:"#ef4444",alta:"#f97316",media:"#3b82f6",baja:"#94a3b8"};
const PBG = {urgente:"#fef2f2",alta:"#fff7ed",media:"#eff6ff",baja:"#f8fafc"};
const ARRIVE_DIST = 50;
const DEPART_DIST = 150;
const DEPOT_DEPART_DIST = 200;

function haversine(lat1,lng1,lat2,lng2){
  const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

async function getRoute(waypoints){
  if(waypoints.length < 2) return null;

  // Intentar OSRM primero
  const coords = waypoints.map(p=>p[1]+","+p[0]).join(";");
  const osrmServers = [
    "https://router.project-osrm.org/route/v1/driving/",
    "https://routing.openstreetmap.de/routed-car/route/v1/driving/",
  ];
  for(const server of osrmServers){
    try{
      const r = await fetch(server+coords+"?overview=full&geometries=geojson",{signal:AbortSignal.timeout(5000)});
      const d = await r.json();
      if(d.code==="Ok" && d.routes && d.routes.length>0){
        return d.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
      }
    }catch(e){}
  }

  // Fallback: OpenRouteService (gratuito, requiere key)
  // Si no funciona ninguno, devolver null (líneas rectas)
  return null;
}
// Alias para compatibilidad
const getOSRMRoute = getRoute;

function Spinner(){ return <div style={{width:28,height:28,border:"3px solid #e2e8f0",borderTop:"3px solid #6366f1",borderRadius:"50%",animation:"spin .7s linear infinite"}}/>; }
function PTag({p}){ return <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:20,background:PBG[p],color:PC[p],letterSpacing:.3,textTransform:"capitalize"}}>{p}</span>; }

function SigPad({onCapture,onCancel}){
  const ref=useRef(null); const drawing=useRef(false); const last=useRef(null);
  function pos(e,c){ const r=c.getBoundingClientRect(); const src=e.touches?e.touches[0]:e; return{x:src.clientX-r.left,y:src.clientY-r.top}; }
  function start(e){ e.preventDefault(); drawing.current=true; last.current=pos(e,ref.current); }
  function move(e){ e.preventDefault(); if(!drawing.current)return; const c=ref.current,ctx=c.getContext("2d"),p=pos(e,c); ctx.beginPath(); ctx.moveTo(last.current.x,last.current.y); ctx.lineTo(p.x,p.y); ctx.strokeStyle="#111"; ctx.lineWidth=2.5; ctx.lineCap="round"; ctx.stroke(); last.current=p; }
  function end(e){ e.preventDefault(); drawing.current=false; }
  function clear(){ ref.current.getContext("2d").clearRect(0,0,ref.current.width,ref.current.height); }
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(3px)"}}>
      <div style={{background:"#fff",borderRadius:"16px 16px 0 0",padding:20,width:"100%",maxWidth:480,animation:"fadeUp .25s ease",paddingBottom:32}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>Firma del receptor</div>
        <div style={{fontSize:12,color:"#94a3b8",marginBottom:12}}>Firmá para confirmar la entrega</div>
        <canvas ref={ref} width={440} height={130} style={{border:"1.5px solid #e2e8f0",borderRadius:10,touchAction:"none",display:"block",width:"100%",background:"#fafafa"}}
          onMouseDown={start} onMouseMove={move} onMouseUp={end}
          onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
        <div style={{display:"flex",gap:8,marginTop:12}}>
          <button onClick={clear} style={{flex:1,padding:"11px",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#fff",fontSize:13,fontWeight:500}}>Limpiar</button>
          <button onClick={onCancel} style={{flex:1,padding:"11px",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#fff",fontSize:13,fontWeight:500}}>Cancelar</button>
          <button onClick={()=>onCapture(ref.current.toDataURL())} style={{flex:2,padding:"11px",borderRadius:10,border:"none",background:"#111",color:"#fff",fontSize:13,fontWeight:600}}>Confirmar</button>
        </div>
      </div>
    </div>
  );
}

function RouteMap({stops, clients, curIdx, driver, depot, onMarkerClick, driverPos}){
  const ref = useRef(null);
  const mapRef = useRef(null);
  const markersRef = useRef([]);
  const routeRef = useRef(null);
  const driverMarkerRef = useRef(null);

  useEffect(()=>{
    if(!ref.current) return;
    if(mapRef.current){ mapRef.current.remove(); mapRef.current=null; }
    const map = L.map(ref.current,{zoomControl:false,attributionControl:false}).setView([-38.71,-62.27],13);
    mapRef.current = map;
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}).addTo(map);
    L.control.zoom({position:"bottomright"}).addTo(map);
    return()=>{ if(mapRef.current){ mapRef.current.remove(); mapRef.current=null; } };
  },[]);

  useEffect(()=>{
    const map = mapRef.current;
    if(!map) return;
    markersRef.current.forEach(m=>map.removeLayer(m));
    markersRef.current = [];
    if(routeRef.current){ map.removeLayer(routeRef.current); routeRef.current=null; }

    const waypoints = [];

    if(depot && depot.lat && depot.lng){
      waypoints.push([depot.lat, depot.lng]);
      const di = L.divIcon({className:"",html:'<div style="width:34px;height:34px;border-radius:8px;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3)">&#127981;</div>',iconSize:[34,34],iconAnchor:[17,34]});
      markersRef.current.push(L.marker([depot.lat,depot.lng],{icon:di}).addTo(map));
    }

    const allPts = [...waypoints];
    stops.forEach((s,i)=>{
      const c = clients.find(x=>x.id===s.client_id);
      if(!c || !c.lat || !c.lng) return;
      waypoints.push([c.lat,c.lng]);
      allPts.push([c.lat,c.lng]);
      const done = s.status === "entregado";
      const arrived = s.arrived_at && s.status !== "entregado";
      const isCur = i === curIdx;
      const color = done ? "#10b981" : arrived ? "#f59e0b" : isCur ? (PC[s.priority]||"#6366f1") : "#94a3b8";
      const size = isCur ? 38 : 28;
      const label = done ? "✓" : arrived ? "•" : String(i+1);
      const icon = L.divIcon({className:"",html:'<div style="width:'+size+'px;height:'+size+'px;border-radius:50%;background:'+color+';color:#fff;display:flex;align-items:center;justify-content:center;font-size:'+(isCur?14:11)+'px;font-weight:700;border:'+(isCur?"3px":"2px")+' solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.3);font-family:Inter,sans-serif">'+label+'</div>',iconSize:[size,size],iconAnchor:[size/2,size/2]});
      const m = L.marker([c.lat,c.lng],{icon}).addTo(map);
      m.on("click",()=>{ if(onMarkerClick) onMarkerClick(i); });
      m.bindPopup('<div style="font-family:Inter,sans-serif"><b>'+c.name+'</b><br><span style="font-size:11px;color:#64748b">'+c.address+'</span><br><span style="color:'+color+';font-size:11px">'+s.time_limit+(done?" · Entregado":arrived?" · En parada":"")+'</span></div>');
      if(isCur) m.openPopup();
      markersRef.current.push(m);
    });

    if(waypoints.length > 1){
      const color = (driver && driver.color) ? driver.color : "#6366f1";
      getOSRMRoute(waypoints).then(coords=>{
        if(!coords || !mapRef.current) return;
        routeRef.current = L.polyline(coords,{color:color,weight:4,opacity:.75}).addTo(mapRef.current);
        if(allPts.length > 0) mapRef.current.fitBounds(allPts,{padding:[40,40]});
      });
    } else if(allPts.length > 0){
      map.fitBounds(allPts,{padding:[40,40]});
    }

    setTimeout(()=>map.invalidateSize(),100);
  },[stops,clients,curIdx,depot]);

  useEffect(()=>{
    const map = mapRef.current;
    if(!map || !driverPos) return;
    if(driverMarkerRef.current){ map.removeLayer(driverMarkerRef.current); }
    const color = (driver && driver.color) ? driver.color : "#6366f1";
    const icon = L.divIcon({className:"",html:'<div style="width:38px;height:38px;border-radius:50%;background:'+color+';border:3px solid #fff;box-shadow:0 3px 12px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:18px">&#128667;</div>',iconSize:[38,38],iconAnchor:[19,19]});
    driverMarkerRef.current = L.marker([driverPos.lat,driverPos.lng],{icon:icon,zIndexOffset:999}).addTo(map);
  },[driverPos]);

  return <div ref={ref} style={{width:"100%",height:"100%"}}/>;
}

function App(){
  const [screen,setScreen]       = useState("login");
  const [loading,setLoading]     = useState(true);
  const [driver,setDriver]       = useState(null);
  const [drivers,setDrivers]     = useState([]);
  const [myStops,setMyStops]     = useState([]);
  const [clients,setClients]     = useState([]);
  const [products,setProducts]   = useState([]);
  const [depot,setDepot]         = useState(()=>{
    try{
      const d=JSON.parse(localStorage.getItem("cachofer_depot")||"{}");
      if(d && d.lat) return d;
    }catch{}
    return null;
  });
  const [curIdx,setCurIdx]       = useState(0);
  const [showSig,setShowSig]     = useState(false);
  const [showPanel,setShowPanel] = useState(true);
  const [note,setNote]           = useState("");
  const [toast,setToast]         = useState(null);
  const [driverPos,setDriverPos] = useState(null);
  const [routeChanged,setRouteChanged]   = useState(null);
  const [departedDepot,setDepartedDepot] = useState(false);
  const [departedStop,setDepartedStop]   = useState(null);

  const wakeLockRef   = useRef(null);
  const [refreshing,setRefreshing] = useState(false);
  const arrivedRef    = useRef({});
  const departedRef   = useRef({});

  async function manualRefresh(){
    setRefreshing(true);
    await Promise.all([loadStops(driver.id), reloadDepot()]);
    setTimeout(()=>setRefreshing(false),800);
    t_("🔄 Ruta actualizada");
  }

  const t_ = (msg, type="ok") => { setToast({msg,type}); setTimeout(()=>setToast(null),3000); };

  // Load base data
  useEffect(()=>{
    async function loadAll(){
      try{
        const [d,cl,pr] = await Promise.all([
          dbGet("drivers",{},"name"),
          dbGet("clients"),
          dbGet("products",{},"name"),
        ]);
        if(d.data) setDrivers(d.data);
        if(cl.data) setClients(cl.data);
        if(pr.data) setProducts(pr.data);
      }catch(e){ console.error("Load error:",e); }

      try{
        const {data} = await dbGet("config",{key:"depot"});
        if(data && data[0] && data[0].value && data[0].value.address){
          setDepot(data[0].value);
        } else {
          const local = JSON.parse(localStorage.getItem("cachofer_depot")||"{}");
          if(local && local.address) setDepot(local);
        }
      }catch(e){
        try{ const dep=JSON.parse(localStorage.getItem("cachofer_depot")||"{}"); if(dep && dep.address) setDepot(dep); }catch{}
      }
      setLoading(false);
    }
    loadAll();
  },[]);

  async function loadStops(driverId){
    const {data} = await dbGet("stops",{driver_id:driverId,work_date:todayStr()},"route_order");
    if(data) setMyStops(data);
    return data||[];
  }

  // Reload depot from Supabase (called on manual refresh too)
  async function reloadDepot(){
    try{
      const {data} = await dbGet("config",{key:"depot"});
      if(data && data[0] && data[0].value && data[0].value.lat){
        setDepot(data[0].value);
        return data[0].value;
      }
    }catch(e){}
    return null;
  }

  async function selectDriver(dr){
    setDriver(dr);
    const [stops] = await Promise.all([loadStops(dr.id), reloadDepot()]);
    const first = stops.findIndex(s=>s.status!=="entregado");
    setCurIdx(first>=0?first:0);
    setScreen("map");
  }

  // WakeLock: keep screen on in map mode
  useEffect(()=>{
    if(screen==="map"){
      if("wakeLock" in navigator){
        navigator.wakeLock.request("screen").then(lock=>{ wakeLockRef.current=lock; }).catch(()=>{});
      }
    } else {
      if(wakeLockRef.current){ wakeLockRef.current.release(); wakeLockRef.current=null; }
    }
    return()=>{ if(wakeLockRef.current){ wakeLockRef.current.release(); wakeLockRef.current=null; } };
  },[screen]);

  // Reactivate WakeLock on visibility change
  useEffect(()=>{
    function onVisible(){
      if(screen==="map" && document.visibilityState==="visible" && !wakeLockRef.current){
        navigator.wakeLock && navigator.wakeLock.request("screen").then(lock=>{ wakeLockRef.current=lock; }).catch(()=>{});
      }
    }
    document.addEventListener("visibilitychange",onVisible);
    return()=>document.removeEventListener("visibilitychange",onVisible);
  },[screen]);

  // GPS tracking + auto-detection
  useEffect(()=>{
    if(!driver || screen==="login") return;
    if(!navigator.geolocation) return;
    let lastSend = 0;

    const id = navigator.geolocation.watchPosition(async pos=>{
      const {latitude:lat,longitude:lng} = pos.coords;
      setDriverPos({lat,lng});

      // Send GPS to Supabase every 15s
      const now = Date.now();
      if(now-lastSend > 15000){
        lastSend = now;
        await dbUpdate("drivers",{current_lat:lat,current_lng:lng,location_updated_at:new Date().toISOString(),status:"en_ruta"},"id",driver.id);
        setDriver(p=>({...p,current_lat:lat,current_lng:lng}));
      }

      // Depot departure detection
      setDepartedDepot(prev=>{
        if(!prev && depot && depot.lat && depot.lng){
          const d = haversine(lat,lng,depot.lat,depot.lng);
          if(d > DEPOT_DEPART_DIST){
            t_("🚛 Recorrido iniciado — ¡Buen viaje!","arrive");
            return true;
          }
        }
        return prev;
      });

      // Stop proximity detection
      setMyStops(currentStops=>{
        currentStops.forEach(async(s,i)=>{
          if(s.status === "entregado") return;
          const c = clients.find(x=>x.id===s.client_id);
          if(!c || !c.lat || !c.lng) return;
          const dist = haversine(lat,lng,c.lat,c.lng);

          // ARRIVAL: < 50m
          if(dist < ARRIVE_DIST && !arrivedRef.current[s.id] && !s.arrived_at){
            arrivedRef.current[s.id] = true;
            const ts = new Date().toISOString();
            await dbUpdate("stops",{arrived_at:ts},"id",s.id);
            setMyStops(prev=>prev.map(x=>x.id===s.id?{...x,arrived_at:ts}:x));
            setCurIdx(i);
            t_("📍 Llegaste a "+c.name,"arrive");
          }

          // DEPARTURE: > 150m after arrival
          if(dist > DEPART_DIST && arrivedRef.current[s.id] && !departedRef.current[s.id] && s.status!=="entregado"){
            departedRef.current[s.id] = true;
            const ts = new Date().toISOString();
            await dbUpdate("stops",{departure_at:ts},"id",s.id);
            setMyStops(prev=>prev.map(x=>x.id===s.id?{...x,departure_at:ts}:x));
            setDepartedStop(i);
          }
        });
        return currentStops;
      });
    },err=>{ console.log("GPS:",err.message); },{enableHighAccuracy:true,maximumAge:5000,timeout:15000});

    return()=>navigator.geolocation.clearWatch(id);
  },[driver,screen,clients,depot]);

  // Route change detection: poll every 10s
  useEffect(()=>{
    if(!driver || screen==="login") return;
    const rt = setInterval(async()=>{
      const {data} = await dbGet("stops",{driver_id:driver.id,work_date:todayStr()},"route_order");
      if(!data) return;
      setMyStops(prev=>{
        if(prev.length === 0) return prev;
        const prevKey = prev.map(s=>s.id+s.route_order).join();
        const newKey  = data.map(s=>s.id+s.route_order).join();
        if(prevKey !== newKey){
          const added   = data.filter(s=>!prev.find(p=>p.id===s.id));
          const removed = prev.filter(s=>!data.find(d=>d.id===s.id));
          const reordered = data.filter(s=>{ const p=prev.find(p=>p.id===s.id); return p&&p.route_order!==s.route_order; });
          let msg = "📋 El recorrido fue modificado";
          if(added.length>0)   msg = "📦 Se agregaron "+added.length+" parada"+(added.length>1?"s":"")+" al recorrido";
          else if(removed.length>0) msg = "🗑 Se eliminó una parada del recorrido";
          else if(reordered.length>0) msg = "🔀 Se reordenó el recorrido";
          setRouteChanged(msg);
          return data;
        }
        return prev;
      });
    },10000);

    // Full reload every 60 min
    const hr = setInterval(()=>loadStops(driver.id), 60*60*1000);

    return()=>{ clearInterval(rt); clearInterval(hr); };
  },[driver,screen]);

  async function confirmDelivery(sig, stopIdx){
    const idx = stopIdx !== undefined ? stopIdx : curIdx;
    const stop = myStops[idx];
    const now = new Date().toISOString();
    const timeMin = stop.arrived_at ? Math.round((new Date(now)-new Date(stop.arrived_at))/60000) : null;
    await dbUpdate("stops",{status:"entregado",signature:sig||null,delivery_note:note,delivered_at:now,time_at_stop_minutes:timeMin},"id",stop.id);
    const updated = myStops.map((s,i)=>i===idx?{...s,status:"entregado",delivered_at:now}:s);
    setMyStops(updated);
    setShowSig(false); setNote(""); setDepartedStop(null);
    t_("✓ Entrega confirmada");
    setTimeout(()=>{
      const next = updated.findIndex((s,i)=>i>idx&&s.status!=="entregado");
      if(next>=0) setCurIdx(next);
      else{ const any=updated.findIndex(s=>s.status!=="entregado"); any>=0?setCurIdx(any):setScreen("done"); }
    },800);
  }

  const cur        = myStops[curIdx];
  const curClient  = cur ? (clients.find(x=>x.id===cur.client_id)||{}) : {};
  const prods      = cur ? (cur.products||[]).map(p=>{ const pr=products.find(x=>x.id===p.productId); return pr?pr.name+" ×"+p.qty:""; }).filter(Boolean).join(" · ") : "";
  const pending    = myStops.filter(s=>s.status!=="entregado").length;
  const delivered  = myStops.filter(s=>s.status==="entregado").length;

  /* LOGIN */
  if(loading) return(
    <div style={{height:"100%",background:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <Spinner/><div style={{fontSize:13,color:"#94a3b8"}}>Conectando…</div>
    </div>
  );

  if(screen==="login") return(
    <div style={{height:"100%",background:"#fff",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"36px 24px 22px",borderBottom:"1px solid #f1f5f9"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
          <img src="icon-192.png" style={{width:46,height:46,borderRadius:12}} alt="" onError={e=>e.target.style.display="none"}/>
          <div>
            <div style={{fontSize:22,fontWeight:800,letterSpacing:-.5}}>CA-<span style={{color:"#f97316"}}>Chofer</span></div>
            <div style={{fontSize:11,color:"#94a3b8",letterSpacing:.5,textTransform:"uppercase"}}>App del Chofer v7</div>
          </div>
        </div>
        <div style={{fontSize:14,color:"#64748b"}}>Seleccioná tu nombre para ver tu ruta de hoy</div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>
        {drivers.length===0 && <div style={{textAlign:"center",color:"#cbd5e1",fontSize:13,marginTop:40}}>Sin choferes registrados.</div>}
        {drivers.map(dr=>(
          <button key={dr.id} onClick={()=>selectDriver(dr)}
            style={{width:"100%",display:"flex",alignItems:"center",gap:14,padding:"14px 16px",borderRadius:14,border:"1.5px solid #f1f5f9",background:"#fff",marginBottom:10,textAlign:"left"}}>
            <div style={{width:52,height:52,borderRadius:14,background:dr.color||"#6366f1",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:17,fontWeight:700,flexShrink:0}}>{dr.avatar}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:16,fontWeight:600,marginBottom:3}}>{dr.name}</div>
              <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"#94a3b8"}}>
                <span style={{width:7,height:7,borderRadius:"50%",background:dr.status==="en_ruta"?"#10b981":"#cbd5e1",display:"inline-block"}}/>
                {dr.status==="en_ruta"?"En ruta":"Disponible"}
              </div>
            </div>
            <span style={{fontSize:18,color:"#e2e8f0"}}>→</span>
          </button>
        ))}
      </div>
      <div style={{padding:"10px 20px 24px",borderTop:"1px solid #f1f5f9",textAlign:"center"}}>
        <div style={{fontSize:11,color:"#cbd5e1"}}>CA-Chofer v7 · Detección GPS automática</div>
      </div>
    </div>
  );

  /* DONE */
  if(screen==="done") return(
    <div style={{height:"100%",background:"#fff",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:24}}>
      <div style={{fontSize:72}}>🎉</div>
      <div style={{fontSize:26,fontWeight:800,color:"#10b981"}}>¡Ruta completada!</div>
      <div style={{background:"#f0fdf4",border:"1.5px solid #bbf7d0",borderRadius:14,padding:"18px 44px",textAlign:"center"}}>
        <div style={{fontSize:44,fontWeight:800,color:"#10b981"}}>{myStops.length}</div>
        <div style={{fontSize:11,color:"#64748b",letterSpacing:1,textTransform:"uppercase"}}>Entregas realizadas</div>
      </div>
      <button onClick={()=>{setScreen("login");setDriver(null);setMyStops([]);}} style={{marginTop:12,padding:"10px 24px",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#fff",fontSize:13,fontWeight:500,color:"#64748b"}}>Cerrar sesión</button>
    </div>
  );

  /* MAP */
  if(screen==="map") return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#000",position:"relative"}}>

      {/* Banner: cambio de ruta */}
      {routeChanged && (
        <div style={{background:"#f97316",color:"#fff",padding:"12px 16px",display:"flex",alignItems:"center",gap:10,zIndex:20,flexShrink:0,animation:"bannerIn .3s ease"}}>
          <span style={{fontSize:18,flexShrink:0}}>⚠️</span>
          <span style={{fontSize:13,fontWeight:600,flex:1,lineHeight:1.3}}>{routeChanged}</span>
          <button onClick={()=>setRouteChanged(null)} style={{background:"rgba(255,255,255,.25)",border:"none",borderRadius:8,padding:"5px 12px",color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer",flexShrink:0,whiteSpace:"nowrap"}}>OK</button>
        </div>
      )}

      {/* Header */}
      <div style={{height:48,background:"#111",display:"flex",alignItems:"center",padding:"0 14px",gap:10,flexShrink:0,zIndex:10}}>
        <div style={{width:32,height:32,borderRadius:9,background:driver.color||"#6366f1",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,fontWeight:700,flexShrink:0}}>{driver.avatar}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12,fontWeight:600,color:"#fff",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{driver.name}</div>
          <div style={{fontSize:10,color:"#555"}}>
            {delivered}/{myStops.length} entregas · {pending} pendientes
            {departedDepot ? " · 🚛 En ruta" : (depot && depot.address ? " · 🏭 En depósito" : "")}
          </div>
        </div>
        <button onClick={manualRefresh} disabled={refreshing}
          style={{width:32,height:32,borderRadius:9,border:"1px solid #333",background:refreshing?"#222":"#1a1a1a",color:"#fff",fontSize:15,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,animation:refreshing?"spin .7s linear infinite":"none"}}>
          🔄
        </button>
        <div style={{display:"flex",gap:4,flexShrink:0,overflowX:"auto",maxWidth:"40%"}}>
          {myStops.map((s,i)=>{
            const done = s.status==="entregado";
            const arrived = s.arrived_at && !done;
            const isCur = i===curIdx;
            const bg = done?"#10b981":arrived?"#f59e0b":isCur?(PC[s.priority]||"#6366f1"):"#333";
            const sz = isCur?20:14;
            return(
              <div key={s.id} onClick={()=>setCurIdx(i)}
                style={{width:sz,height:sz,borderRadius:"50%",background:bg,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:700,cursor:"pointer",border:isCur?"2px solid #fff":"none",flexShrink:0}}>
                {done?"✓":i+1}
              </div>
            );
          })}
        </div>
      </div>

      {/* Map */}
      <div style={{flex:1,position:"relative"}}>
        <RouteMap stops={myStops} clients={clients} curIdx={curIdx} driver={driver} depot={depot} driverPos={driverPos} onMarkerClick={i=>setCurIdx(i)}/>
      </div>

      {/* Bottom panel */}
      <div style={{background:"#fff",borderRadius:"18px 18px 0 0",boxShadow:"0 -4px 20px rgba(0,0,0,.15)",flexShrink:0,zIndex:10,maxHeight:showPanel?"68%":"auto",overflowY:"auto"}}>

        {/* Handle */}
        <div onClick={()=>setShowPanel(p=>!p)} style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"10px 0 6px",cursor:"pointer"}}>
          <div style={{width:36,height:4,borderRadius:4,background:"#e2e8f0",marginBottom:4}}/>
          {!showPanel && cur && (
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"4px 16px 2px",width:"100%"}}>
              <PTag p={cur.priority}/>
              <span style={{fontSize:13,fontWeight:600,flex:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{curClient.name||"—"}</span>
              <span style={{fontSize:12,color:PC[cur.priority],fontWeight:600}}>⏰ {cur.time_limit}</span>
            </div>
          )}
        </div>

        {/* Depot status when not yet departed */}
        {showPanel && !departedDepot && depot && depot.address && pending > 0 && (
          <div style={{margin:"0 14px 12px",background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:12,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:20,flexShrink:0}}>🏭</span>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:600,color:"#166534"}}>{depot.name||"Depósito"}</div>
              <div style={{fontSize:11,color:"#4ade80"}}>{depot.address}</div>
            </div>
            <div style={{fontSize:11,color:"#166534",fontWeight:500,whiteSpace:"nowrap"}}>Esperando salida…</div>
          </div>
        )}

        {/* Current stop info */}
        {showPanel && cur && cur.status !== "entregado" && (
          <div style={{padding:"0 14px 24px"}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:12}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4,flexWrap:"wrap"}}>
                  <PTag p={cur.priority}/>
                  <span style={{fontSize:11,color:"#94a3b8"}}>⏰ {cur.time_limit}</span>
                  <span style={{fontSize:11,color:"#94a3b8"}}>#{curIdx+1}/{myStops.length}</span>
                  {cur.arrived_at && <span style={{fontSize:10,fontWeight:600,color:"#f59e0b",background:"#fffbeb",padding:"1px 6px",borderRadius:10}}>📍 En parada</span>}
                </div>
                <div style={{fontSize:16,fontWeight:700,marginBottom:2}}>{curClient.name||"—"}</div>
                <div style={{fontSize:12,color:"#64748b",marginBottom:curClient.notes?4:0}}>{curClient.address}</div>
                {curClient.notes && <div style={{fontSize:11,color:"#94a3b8",background:"#f8fafc",padding:"4px 8px",borderRadius:6,marginTop:4}}>📝 {curClient.notes}</div>}
              </div>
              {curClient.phone && (
                <a href={"tel:"+curClient.phone} style={{width:42,height:42,borderRadius:12,background:"#f0fdf4",border:"1px solid #bbf7d0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,textDecoration:"none",flexShrink:0}}>📞</a>
              )}
            </div>

            {prods && <div style={{background:"#f8fafc",borderRadius:10,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#6366f1"}}>📦 {prods}</div>}

            {cur.arrived_at && (
              <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:10,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#92400e"}}>
                📍 Llegaste a las {new Date(cur.arrived_at).toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"})}
              </div>
            )}

            <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Observación opcional…"
              style={{width:"100%",border:"1.5px solid #e2e8f0",borderRadius:10,padding:"10px 12px",fontSize:13,outline:"none",resize:"none",height:56,color:"#111",marginBottom:12}}/>

            <button onClick={()=>setShowSig(true)}
              style={{width:"100%",background:"#10b981",border:"none",borderRadius:13,padding:"16px",fontSize:16,fontWeight:700,color:"#fff",cursor:"pointer",boxShadow:"0 4px 16px rgba(16,185,129,.3)"}}>
              ✓ Producto entregado
            </button>

            {myStops.length > 1 && (
              <div style={{display:"flex",gap:8,marginTop:10}}>
                <button onClick={()=>setCurIdx(Math.max(0,curIdx-1))} disabled={curIdx===0}
                  style={{flex:1,padding:"10px",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#fff",fontSize:13,fontWeight:500,color:"#64748b",opacity:curIdx===0?0.4:1}}>
                  ← Anterior
                </button>
                <button onClick={()=>{ const n=myStops.findIndex((s,i)=>i>curIdx&&s.status!=="entregado"); if(n>=0)setCurIdx(n); }}
                  disabled={!myStops.find((s,i)=>i>curIdx&&s.status!=="entregado")}
                  style={{flex:1,padding:"10px",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#fff",fontSize:13,fontWeight:500,color:"#64748b"}}>
                  Siguiente →
                </button>
              </div>
            )}
          </div>
        )}

        {showPanel && cur && cur.status === "entregado" && (
          <div style={{padding:"12px 14px 24px",textAlign:"center"}}>
            <div style={{fontSize:28,marginBottom:6}}>✅</div>
            <div style={{fontSize:14,fontWeight:600,color:"#10b981"}}>Entregado en {curClient.name}</div>
            {pending > 0 && (
              <button onClick={()=>{ const n=myStops.findIndex((s,i)=>i>curIdx&&s.status!=="entregado"); if(n>=0)setCurIdx(n); }}
                style={{marginTop:10,padding:"10px 20px",borderRadius:10,border:"none",background:"#111",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}}>
                Ir al siguiente →
              </button>
            )}
          </div>
        )}

        {showPanel && pending === 0 && (
          <div style={{padding:"16px 14px 28px",textAlign:"center"}}>
            <div style={{fontSize:32,marginBottom:8}}>🎉</div>
            <div style={{fontSize:16,fontWeight:700,color:"#10b981"}}>¡Todas las entregas completadas!</div>
            <button onClick={()=>setScreen("done")} style={{marginTop:12,padding:"10px 24px",borderRadius:10,border:"none",background:"#10b981",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}}>Ver resumen</button>
          </div>
        )}
      </div>

      {/* Departure confirmation popup */}
      {departedStop !== null && myStops[departedStop] && myStops[departedStop].status !== "entregado" && (()=>{
        const s = myStops[departedStop];
        const c = clients.find(x=>x.id===s.client_id)||{};
        return(
          <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"calc(100% - 20px)",maxWidth:460,background:"#fff",borderRadius:"16px 16px 0 0",boxShadow:"0 -8px 32px rgba(0,0,0,.25)",zIndex:500,padding:"20px 18px 32px",animation:"fadeUp .3s ease"}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:4,color:"#f97316"}}>⚠️ ¿Confirmás la entrega?</div>
            <div style={{fontSize:14,fontWeight:600,marginBottom:2}}>{c.name}</div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:16}}>Detectamos que te alejaste. ¿Realizaste la entrega?</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setDepartedStop(null)} style={{flex:1,padding:"12px",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#fff",fontSize:13,fontWeight:500,color:"#64748b"}}>No entregué</button>
              <button onClick={()=>{ setCurIdx(departedStop); setShowSig(true); }} style={{flex:2,padding:"12px",borderRadius:10,border:"none",background:"#10b981",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>✓ Sí, confirmar</button>
            </div>
          </div>
        );
      })()}

      {showSig && <SigPad onCapture={sig=>confirmDelivery(sig,curIdx)} onCancel={()=>setShowSig(false)}/>}
      {toast && <div style={{position:"fixed",top:60,left:"50%",transform:"translateX(-50%)",background:toast.type==="arrive"?"#f59e0b":toast.type==="ok"?"#10b981":"#ef4444",color:"#fff",padding:"10px 22px",borderRadius:10,fontSize:13,fontWeight:600,zIndex:500,animation:"slideDown .25s ease",whiteSpace:"nowrap"}}>{toast.msg}</div>}
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
