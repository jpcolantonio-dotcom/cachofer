<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CachoFer — Chofer</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CachoFer">
<meta name="theme-color" content="#111111">
<link rel="apple-touch-icon" href="icon-512.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:#f8f9fa;color:#111;-webkit-font-smoothing:antialiased}
button{font-family:'Inter',sans-serif;cursor:pointer}
input,textarea{font-family:'Inter',sans-serif}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:4px}
textarea::placeholder,input::placeholder{color:#cbd5e1}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root" style="height:100%"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SUPA_URL = "https://jnhwgtvzldxnqyliuyog.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpuaHdndHZ6bGR4bnF5bGl1eW9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMjQwMjMsImV4cCI6MjA5NDYwMDAyM30.0dJvN8eVjyB8joit-wrMMp3Hj__EV4EjQMlsrChdfWs";

const HG = { "apikey": SUPA_KEY, "Authorization": "Bearer "+SUPA_KEY };
const HW = { "apikey": SUPA_KEY, "Authorization": "Bearer "+SUPA_KEY, "Content-Type": "application/json", "Prefer": "return=representation" };

async function dbGet(table, filters={}, orderBy=null){
  let url = SUPA_URL+"/rest/v1/"+table+"?select=*";
  Object.entries(filters).forEach(([k,v])=>{ url+="&"+k+"=eq."+encodeURIComponent(v); });
  if(orderBy) url+="&order="+orderBy+".asc";
  const r = await fetch(url, {method:"GET", headers:HG});
  const d = await r.json();
  if(!r.ok) console.error("dbGet error", table, d);
  return { data: Array.isArray(d)?d:[], error: r.ok?null:d };
}
async function dbUpdate(table, data, col, val){
  const r = await fetch(SUPA_URL+"/rest/v1/"+table+"?"+col+"=eq."+encodeURIComponent(val), {method:"PATCH", headers:HW, body:JSON.stringify(data)});
  const d = await r.json();
  return { data:d, error:r.ok?null:d };
}

const todayStr = () => new Date().toISOString().slice(0,10);
const PC  = {urgente:"#ef4444",alta:"#f97316",media:"#3b82f6",baja:"#94a3b8"};
const PBG = {urgente:"#fef2f2",alta:"#fff7ed",media:"#eff6ff",baja:"#f8fafc"};

function PTag({p}){ return <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:20,background:PBG[p],color:PC[p],letterSpacing:.3,textTransform:"capitalize"}}>{p}</span>; }
function Spinner(){ return <div style={{width:28,height:28,border:"3px solid #e2e8f0",borderTop:"3px solid #6366f1",borderRadius:"50%",animation:"spin .7s linear infinite"}}/>; }

function SigPad({onCapture,onCancel}){
  const ref=useRef(null); const drawing=useRef(false); const last=useRef(null);
  function pos(e,c){const r=c.getBoundingClientRect();const src=e.touches?e.touches[0]:e;return{x:src.clientX-r.left,y:src.clientY-r.top};}
  function start(e){e.preventDefault();drawing.current=true;last.current=pos(e,ref.current);}
  function move(e){e.preventDefault();if(!drawing.current)return;const c=ref.current,ctx=c.getContext("2d"),p=pos(e,c);ctx.beginPath();ctx.moveTo(last.current.x,last.current.y);ctx.lineTo(p.x,p.y);ctx.strokeStyle="#111";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.stroke();last.current=p;}
  function end(e){e.preventDefault();drawing.current=false;}
  function clear(){ref.current.getContext("2d").clearRect(0,0,ref.current.width,ref.current.height);}
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16,backdropFilter:"blur(4px)"}}>
      <div style={{background:"#fff",borderRadius:16,padding:24,width:"100%",maxWidth:380,animation:"fadeUp .25s ease"}}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>Firma del receptor</div>
        <div style={{fontSize:12,color:"#94a3b8",marginBottom:14}}>Firmá en el recuadro para confirmar la entrega</div>
        <canvas ref={ref} width={340} height={160} style={{border:"1.5px solid #e2e8f0",borderRadius:10,touchAction:"none",display:"block",width:"100%",background:"#fafafa"}}
          onMouseDown={start} onMouseMove={move} onMouseUp={end}
          onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
        <div style={{display:"flex",gap:8,marginTop:14}}>
          <button onClick={clear} style={{flex:1,padding:"10px",borderRadius:9,border:"1.5px solid #e2e8f0",background:"#fff",fontSize:13,fontWeight:500}}>Limpiar</button>
          <button onClick={onCancel} style={{flex:1,padding:"10px",borderRadius:9,border:"1.5px solid #e2e8f0",background:"#fff",fontSize:13,fontWeight:500}}>Cancelar</button>
          <button onClick={()=>onCapture(ref.current.toDataURL())} style={{flex:2,padding:"10px",borderRadius:9,border:"none",background:"#111",color:"#fff",fontSize:13,fontWeight:600}}>✓ Confirmar</button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [screen,setScreen]     = useState("login");
  const [loading,setLoading]   = useState(true);
  const [driver,setDriver]     = useState(null);
  const [drivers,setDrivers]   = useState([]);
  const [myStops,setMyStops]   = useState([]);
  const [clients,setClients]   = useState([]);
  const [products,setProducts] = useState([]);
  const [curIdx,setCurIdx]     = useState(0);
  const [showSig,setShowSig]   = useState(false);
  const [note,setNote]         = useState("");
  const [toast,setToast]       = useState(null);
  const [syncing,setSyncing]   = useState(false);

  const t_=(msg,type="ok")=>{setToast({msg,type});setTimeout(()=>setToast(null),2800);};

  useEffect(()=>{
    Promise.all([
      dbGet("drivers",{},"name"),
      dbGet("clients"),
      dbGet("products",{},"name"),
    ]).then(([d,cl,pr])=>{
      if(d.data) setDrivers(d.data);
      if(cl.data) setClients(cl.data);
      if(pr.data) setProducts(pr.data);
      setLoading(false);
    });
  },[]);

  async function loadStops(driverId){
    const{data}=await dbGet("stops",{driver_id:driverId,work_date:todayStr()},"route_order");
    if(data) setMyStops(data);
    return data||[];
  }

  async function selectDriver(dr){
    setDriver(dr);
    setSyncing(true);
    const stops = await loadStops(dr.id);
    setSyncing(false);
    const first = stops.findIndex(s=>s.status!=="entregado");
    setCurIdx(first>=0?first:0);
    setScreen(stops.length>0?"route":"route");
  }

  // GPS: enviar ubicación cada 15 segundos cuando está en ruta
  useEffect(()=>{
    if(!driver||screen==="login"||screen==="done") return;
    if(!navigator.geolocation) return;

    let watchId = null;
    let lastSend = 0;

    watchId = navigator.geolocation.watchPosition(
      async (pos)=>{
        const now = Date.now();
        if(now - lastSend < 15000) return; // max cada 15s
        lastSend = now;
        const {latitude:lat, longitude:lng} = pos.coords;
        await dbUpdate("drivers",{
          current_lat: lat,
          current_lng: lng,
          location_updated_at: new Date().toISOString(),
          status: "en_ruta"
        },"id", driver.id);
      },
      (err)=>console.log("GPS error:",err.message),
      {enableHighAccuracy:true, maximumAge:10000, timeout:10000}
    );

    return()=>{ if(watchId) navigator.geolocation.clearWatch(watchId); };
  },[driver,screen]);

  // Polling every 30s when in route
  useEffect(()=>{
    if(!driver||screen==="login")return;
    const iv=setInterval(async()=>{
      const{data}=await dbGet("stops",{driver_id:driver.id,work_date:todayStr()},"route_order");
      if(data) setMyStops(data);
    },30000);
    return()=>clearInterval(iv);
  },[driver,screen]);

  async function confirmDelivery(sig){
    const stop=myStops[curIdx];
    await dbUpdate("stops",{status:"entregado",signature:sig,delivery_note:note,delivered_at:new Date().toISOString()},"id",stop.id);
    const updated=myStops.map((s,i)=>i===curIdx?{...s,status:"entregado"}:s);
    setMyStops(updated);
    setShowSig(false); setNote("");
    t_("✓ Entrega confirmada");
    setTimeout(()=>{
      const next=updated.findIndex((s,i)=>i>curIdx&&s.status!=="entregado");
      if(next>=0){setCurIdx(next);setScreen("stop");}
      else{
        const any=updated.findIndex(s=>s.status!=="entregado");
        any>=0?setCurIdx(any)||setScreen("stop"):setScreen("done");
      }
    },900);
  }

  const cur=myStops[curIdx];
  const pending=myStops.filter(s=>s.status!=="entregado").length;
  const delivered=myStops.filter(s=>s.status==="entregado").length;

  /* LOGIN */
  if(loading) return(
    <div style={{height:"100%",background:"#fff",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <Spinner/>
      <div style={{fontSize:13,color:"#94a3b8"}}>Conectando…</div>
    </div>
  );

  if(screen==="login") return(
    <div style={{height:"100%",background:"#fff",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"36px 24px 24px",borderBottom:"1px solid #f1f5f9"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
          <img src="icon-192.png" style={{width:48,height:48,borderRadius:12}} alt="CachoFer"/>
          <div>
            <div style={{fontSize:22,fontWeight:800,letterSpacing:-.5}}>CachoFer</div>
            <div style={{fontSize:11,color:"#94a3b8",letterSpacing:.5,textTransform:"uppercase"}}>App del Chofer</div>
          </div>
        </div>
        <div style={{fontSize:14,color:"#64748b"}}>Seleccioná tu nombre para ver tu ruta de hoy</div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>
        {syncing&&<div style={{display:"flex",justifyContent:"center",padding:32}}><Spinner/></div>}
        {!syncing&&drivers.length===0&&<div style={{textAlign:"center",color:"#cbd5e1",fontSize:13,marginTop:40,lineHeight:1.7}}>Sin choferes registrados.<br/>Pedile al administrador que cree tu usuario.</div>}
        {!syncing&&drivers.map(dr=>(
          <button key={dr.id} onClick={()=>selectDriver(dr)}
            style={{width:"100%",display:"flex",alignItems:"center",gap:14,padding:"14px 16px",borderRadius:14,border:"1.5px solid #f1f5f9",background:"#fff",marginBottom:10,textAlign:"left",transition:"all .15s",animation:"fadeUp .2s ease"}}>
            <div style={{width:52,height:52,borderRadius:14,background:dr.color||"#6366f1",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:17,fontWeight:700,flexShrink:0}}>{dr.avatar}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:16,fontWeight:600,marginBottom:3}}>{dr.name}</div>
              <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"#94a3b8"}}>
                <span style={{width:7,height:7,borderRadius:"50%",background:dr.status==="en_ruta"?"#10b981":"#cbd5e1",display:"inline-block"}}/>
                {dr.status==="en_ruta"?"En ruta":"Disponible"}
                {dr.phone&&<><span style={{color:"#e2e8f0"}}>·</span><span>{dr.phone}</span></>}
              </div>
            </div>
            <span style={{fontSize:20,color:"#e2e8f0"}}>→</span>
          </button>
        ))}
      </div>
      <div style={{padding:"10px 20px 24px",borderTop:"1px solid #f1f5f9",textAlign:"center"}}>
        <div style={{fontSize:11,color:"#cbd5e1"}}>Sincronizado en tiempo real · CachoFer v5</div>
      </div>
    </div>
  );

  /* DONE */
  if(screen==="done") return(
    <div style={{height:"100%",background:"#fff",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:24}}>
      <div style={{fontSize:72}}>🎉</div>
      <div style={{fontSize:26,fontWeight:800,color:"#10b981",letterSpacing:-.5}}>¡Ruta completada!</div>
      <div style={{fontSize:14,color:"#64748b",textAlign:"center"}}>Todas las entregas del día fueron realizadas</div>
      <div style={{background:"#f0fdf4",border:"1.5px solid #bbf7d0",borderRadius:14,padding:"18px 44px",textAlign:"center"}}>
        <div style={{fontSize:44,fontWeight:800,color:"#10b981"}}>{myStops.length}</div>
        <div style={{fontSize:11,color:"#64748b",letterSpacing:1,textTransform:"uppercase"}}>Entregas realizadas</div>
      </div>
      <button onClick={()=>{setScreen("login");setDriver(null);setMyStops([]);}} style={{marginTop:12,padding:"10px 24px",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#fff",fontSize:13,fontWeight:500,color:"#64748b"}}>Cerrar sesión</button>
    </div>
  );

  /* ROUTE LIST */
  if(screen==="route") return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#f8f9fa"}}>
      <div style={{background:"#fff",borderBottom:"1px solid #f1f5f9",padding:"14px 18px",display:"flex",alignItems:"center",gap:12,flexShrink:0,boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
        <div style={{width:40,height:40,borderRadius:11,background:driver.color||"#6366f1",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:13,fontWeight:700,flexShrink:0}}>{driver.avatar}</div>
        <div>
          <div style={{fontSize:14,fontWeight:700}}>{driver.name}</div>
          <div style={{fontSize:11,color:"#94a3b8"}}>Ruta de hoy · {new Date().toLocaleDateString("es-AR")}</div>
        </div>
        <div style={{marginLeft:"auto",textAlign:"right"}}>
          <div style={{fontSize:24,fontWeight:800,color:pending>0?"#f97316":"#10b981"}}>{pending}</div>
          <div style={{fontSize:9,color:"#94a3b8",letterSpacing:1,textTransform:"uppercase"}}>pendientes</div>
        </div>
      </div>
      <div style={{height:3,background:"#f1f5f9",flexShrink:0}}>
        <div style={{height:"100%",background:"#10b981",width:`${myStops.length>0?(delivered/myStops.length)*100:0}%`,transition:"width .6s ease"}}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:1,background:"#f1f5f9",flexShrink:0}}>
        {[[myStops.length,"TOTAL"],[delivered,"ENTREGADAS"],[pending,"PENDIENTES"]].map(([v,l])=>(
          <div key={l} style={{background:"#fff",padding:"10px 0",textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:700}}>{v}</div>
            <div style={{fontSize:9,color:"#94a3b8",letterSpacing:1}}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"12px 14px 100px"}}>
        <div style={{fontSize:10,color:"#94a3b8",letterSpacing:2,marginBottom:10,textTransform:"uppercase"}}>Paradas del día</div>
        {myStops.length===0&&(
          <div style={{textAlign:"center",color:"#cbd5e1",fontSize:13,marginTop:56,lineHeight:1.8}}>
            <div style={{fontSize:40,marginBottom:12}}>📭</div>
            Sin paradas asignadas para hoy.<br/>Contactá al administrador.
          </div>
        )}
        {myStops.map((s,i)=>{
          const done=s.status==="entregado", isCur=i===curIdx&&!done;
          const c=clients.find(x=>x.id===s.client_id)||{};
          return(
            <div key={s.id} onClick={()=>{if(!done){setCurIdx(i);setScreen("stop");}}}
              style={{background:"#fff",border:`1.5px solid ${isCur?PC[s.priority]:done?"#dcfce7":"#f1f5f9"}`,borderRadius:12,padding:"12px 14px",marginBottom:8,cursor:done?"default":"pointer",opacity:done?.55:1,display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:32,height:32,borderRadius:"50%",flexShrink:0,background:done?"#10b981":isCur?PC[s.priority]:"#f1f5f9",color:done||isCur?"#fff":"#94a3b8",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700}}>
                {done?"✓":i+1}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600,marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.name||"—"}</div>
                <div style={{fontSize:11,color:"#94a3b8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.address}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:13,fontWeight:600,color:PC[s.priority]}}>{s.time_limit}</div>
                <div style={{fontSize:9,color:"#94a3b8",textTransform:"uppercase",letterSpacing:.5}}>{s.priority}</div>
              </div>
            </div>
          );
        })}
      </div>
      {pending>0&&cur&&(
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,padding:"12px 14px 28px",background:"linear-gradient(to top,#f8f9fa 65%,transparent)"}}>
          <button onClick={()=>setScreen("stop")} style={{width:"100%",background:"#111",border:"none",borderRadius:14,padding:18,fontSize:15,fontWeight:700,color:"#fff",cursor:"pointer",boxShadow:"0 4px 20px rgba(0,0,0,0.2)"}}>
            → Ir a entrega #{curIdx+1}
          </button>
        </div>
      )}
    </div>
  );

  /* STOP DETAIL */
  if(screen==="stop"&&cur){
    const s=cur;
    const c=clients.find(x=>x.id===s.client_id)||{};
    const mapsUrl=`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(c.address||"")}&travelmode=driving`;
    return(
      <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#f8f9fa",overflowY:"auto"}}>
        <div style={{background:"#fff",borderBottom:"1px solid #f1f5f9",padding:"12px 16px",display:"flex",alignItems:"center",gap:10,flexShrink:0,boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
          <button onClick={()=>setScreen("route")} style={{background:"none",border:"none",fontSize:22,color:"#64748b",cursor:"pointer",padding:"2px 6px",borderRadius:6}}>←</button>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600}}>Parada {curIdx+1} / {myStops.length}</div>
            <div style={{fontSize:11,color:"#94a3b8"}}>{pending-1} restantes</div>
          </div>
          <div style={{background:PBG[s.priority],border:`1px solid ${PC[s.priority]}30`,borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:600,color:PC[s.priority],textTransform:"capitalize"}}>{s.priority} · ⏰ {s.time_limit}</div>
        </div>
        <div style={{padding:"14px 14px 120px"}}>
          {/* Dirección */}
          <div style={{background:"#fff",borderRadius:14,padding:"16px 18px",marginBottom:10,border:"1px solid #f1f5f9"}}>
            <div style={{fontSize:10,fontWeight:600,color:"#94a3b8",letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Dirección</div>
            <div style={{fontSize:18,fontWeight:700,lineHeight:1.3,marginBottom:16}}>{c.address||"Sin dirección"}</div>
            <a href={mapsUrl} target="_blank" rel="noreferrer"
              style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"13px",borderRadius:10,background:"#1d4ed8",color:"#fff",textDecoration:"none",fontSize:14,fontWeight:600}}>
              🗺️ Abrir navegación en Maps
            </a>
          </div>
          {/* Destinatario */}
          <div style={{background:"#fff",borderRadius:14,padding:"14px 18px",marginBottom:10,border:"1px solid #f1f5f9"}}>
            <div style={{fontSize:10,fontWeight:600,color:"#94a3b8",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Destinatario</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontSize:17,fontWeight:700}}>{c.name||"—"}</div>
                <div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>{c.phone||"Sin teléfono"}</div>
              </div>
              {c.phone&&<a href={`tel:${c.phone}`} style={{width:44,height:44,borderRadius:12,background:"#f0fdf4",border:"1px solid #bbf7d0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,textDecoration:"none"}}>📞</a>}
            </div>
            {c.notes&&<div style={{marginTop:10,padding:"8px 10px",background:"#f8fafc",borderRadius:8,fontSize:12,color:"#64748b"}}>📝 {c.notes}</div>}
          </div>
          {/* Paquetes */}
          {(s.products||[]).length>0&&(
            <div style={{background:"#fff",borderRadius:14,padding:"14px 18px",marginBottom:10,border:"1px solid #f1f5f9"}}>
              <div style={{fontSize:10,fontWeight:600,color:"#94a3b8",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Paquetes</div>
              {(s.products||[]).map(item=>{
                const pr=products.find(x=>x.id===item.productId);
                return pr?(
                  <div key={item.productId} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #f8f9fa"}}>
                    <div style={{width:32,height:32,borderRadius:8,background:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>📦</div>
                    <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{pr.name}</div><div style={{fontSize:11,color:"#94a3b8"}}>{pr.description}</div></div>
                    <div style={{fontSize:16,fontWeight:700,color:"#6366f1"}}>×{item.qty}</div>
                  </div>
                ):null;
              })}
            </div>
          )}
          {/* Progreso */}
          <div style={{background:"#fff",borderRadius:14,padding:"14px 18px",marginBottom:10,border:"1px solid #f1f5f9"}}>
            <div style={{fontSize:10,fontWeight:600,color:"#94a3b8",letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>Progreso</div>
            <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
              {myStops.map((ms,i)=>(
                <div key={ms.id} onClick={()=>{if(ms.status!=="entregado"){setCurIdx(i);}}}
                  style={{width:32,height:32,borderRadius:"50%",background:ms.status==="entregado"?"#10b981":i===curIdx?PC[s.priority]:"#f1f5f9",color:ms.status==="entregado"||i===curIdx?"#fff":"#94a3b8",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,cursor:ms.status!=="entregado"?"pointer":"default"}}>
                  {ms.status==="entregado"?"✓":i+1}
                </div>
              ))}
            </div>
          </div>
          {/* Nota */}
          <div style={{background:"#fff",borderRadius:14,padding:"14px 18px",marginBottom:10,border:"1px solid #f1f5f9"}}>
            <div style={{fontSize:10,fontWeight:600,color:"#94a3b8",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Observación (opcional)</div>
            <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Ej: Dejé con el portero, nadie en casa…"
              style={{width:"100%",border:"1.5px solid #e2e8f0",borderRadius:8,padding:"10px 12px",fontSize:13,outline:"none",resize:"none",height:72,color:"#111"}}/>
          </div>
        </div>
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,padding:"12px 14px 28px",background:"linear-gradient(to top,#f8f9fa 65%,transparent)"}}>
          <button onClick={()=>setShowSig(true)}
            style={{width:"100%",background:"#10b981",border:"none",borderRadius:14,padding:18,fontSize:15,fontWeight:700,color:"#fff",cursor:"pointer",boxShadow:"0 4px 20px rgba(16,185,129,0.3)"}}>
            ✓ Confirmar entrega
          </button>
        </div>
        {showSig&&<SigPad onCapture={confirmDelivery} onCancel={()=>setShowSig(false)}/>}
        {toast&&<div style={{position:"fixed",top:72,left:"50%",transform:"translateX(-50%)",background:toast.type==="ok"?"#10b981":"#ef4444",color:"#fff",padding:"10px 22px",borderRadius:10,fontSize:14,fontWeight:600,zIndex:400,animation:"slideDown .25s ease",whiteSpace:"nowrap"}}>{toast.msg}</div>}
      </div>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
