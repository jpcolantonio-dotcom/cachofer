async function dbGet(table,filters={},orderBy=null){
  let url=SUPA_URL+"/rest/v1/"+table+"?select=*";
  Object.entries(filters).forEach(([k,v])=>{url+="&"+k+"=eq."+encodeURIComponent(v);});
  if(orderBy)url+="&order="+orderBy+".asc";
  const r=await fetch(url,{method:"GET",headers:HG});
  const d=await r.json();
  return{data:Array.isArray(d)?d:[],error:r.ok?null:d};
}
async function dbUpdate(table,data,col,val){
  const r=await fetch(SUPA_URL+"/rest/v1/"+table+"?"+col+"=eq."+encodeURIComponent(val),{method:"PATCH",headers:HW,body:JSON.stringify(data)});
  const d=await r.json();
  return{data:d,error:r.ok?null:d};
}

/* ── DISTANCIA EN METROS (Haversine) ───────────────────────────────────────*/
function haversine(lat1,lng1,lat2,lng2){
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* ── OSRM: ruta real por calles ─────────────────────────────────────────── */
async function getOSRMRoute(waypoints){
  if(waypoints.length<2)return null;
  try{
    const coords=waypoints.map(p=>`${p[1]},${p[0]}`).join(";");
    const url=`https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`;
    const r=await fetch(url);
    const d=await r.json();
    if(d.code==="Ok"&&d.routes?.length>0){
      return{
        coords:d.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]),
        distance:Math.round(d.routes[0].distance/1000*10)/10,
        duration:Math.round(d.routes[0].duration/60)
      };
    }
  }catch(e){console.log("OSRM error",e);}
  return null;
}

function Spinner(){return <div style={{width:28,height:28,border:"3px solid #e2e8f0",borderTop:"3px solid #6366f1",borderRadius:"50%",animation:"spin .7s linear infinite"}}/>;}

/* ── SIGNATURE PAD ─────────────────────────────────────────────────────────*/
function SigPad({onCapture,onCancel}){
  const ref=useRef(null);const drawing=useRef(false);const last=useRef(null);
  function pos(e,c){const r=c.getBoundingClientRect();const src=e.touches?e.touches[0]:e;return{x:src.clientX-r.left,y:src.clientY-r.top};}
  function start(e){e.preventDefault();drawing.current=true;last.current=pos(e,ref.current);}
  function move(e){e.preventDefault();if(!drawing.current)return;const c=ref.current,ctx=c.getContext("2d"),p=pos(e,c);ctx.beginPath();ctx.moveTo(last.current.x,last.current.y);ctx.lineTo(p.x,p.y);ctx.strokeStyle="#111";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.stroke();last.current=p;}
  function end(e){e.preventDefault();drawing.current=false;}
  function clear(){ref.current.getContext("2d").clearRect(0,0,ref.current.width,ref.current.height);}
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(3px)"}}>
      <div style={{background:"#fff",borderRadius:"16px 16px 0 0",padding:20,width:"100%",maxWidth:480,animation:"fadeUp .25s ease",paddingBottom:32}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>Firma del receptor</div>
        <div style={{fontSize:12,color:"#94a3b8",marginBottom:12}}>Firmá para confirmar la entrega</div>
        <canvas ref={ref} width={440} height={130} style={{border:"1.5px solid #e2e8f0",borderRadius:10,touchAction:"none",display:"block",width:"100%",background:"#fafafa"}}
          onMouseDown={start} onMouseMove={move} onMouseUp={end}
          onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
        <div style={{display:"flex",gap:8,marginTop:12}}>
          <button onClick={clear} style={{flex:1,padding:"11px",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#fff",fontSize:13,fontWeight:500}}>Limpiar</button>
          <button onClick={onCancel} style={{flex:1,padding:"11px",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#fff",fontSize:13,fontWeight:500}}>Cancelar</button>
          <button onClick={()=>onCapture(ref.current.toDataURL())} style={{flex:2,padding:"11px",borderRadius:10,border:"none",background:"#111",color:"#fff",fontSize:13,fontWeight:600}}>✓ Confirmar</button>
        </div>
      </div>
    </div>
  );
}

/* ── ROUTE MAP CON OSRM ─────────────────────────────────────────────────── */
function RouteMap({stops,clients,curIdx,driver,depot,onMarkerClick,driverPos}){
  const ref=useRef(null);const mapRef=useRef(null);
  const markersRef=useRef([]);const routeLayerRef=useRef(null);const driverMarkerRef=useRef(null);
  const arrivedCircleRef=useRef(null);

  useEffect(()=>{
    if(!ref.current)return;
    if(mapRef.current){mapRef.current.remove();mapRef.current=null;}
    const map=L.map(ref.current,{zoomControl:false,attributionControl:false}).setView([-38.71,-62.27],13);
    mapRef.current=map;
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}).addTo(map);
    L.control.zoom({position:"bottomright"}).addTo(map);
    return()=>{if(mapRef.current){mapRef.current.remove();mapRef.current=null;}};
  },[]);

  // Redraw markers + OSRM route
  useEffect(()=>{
    const map=mapRef.current;if(!map)return;
    markersRef.current.forEach(m=>map.removeLayer(m));markersRef.current=[];
    if(routeLayerRef.current){map.removeLayer(routeLayerRef.current);routeLayerRef.current=null;}
    if(arrivedCircleRef.current){map.removeLayer(arrivedCircleRef.current);arrivedCircleRef.current=null;}

    const waypoints=[];
    if(depot?.lat&&depot?.lng){
      waypoints.push([depot.lat,depot.lng]);
      const di=L.divIcon({className:"",html:`<div style="width:34px;height:34px;border-radius:8px;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3)">🏭</div>`,iconSize:[34,34],iconAnchor:[17,34]});
      const m=L.marker([depot.lat,depot.lng],{icon:di}).addTo(map);
      markersRef.current.push(m);
    }

    const allPts=[...waypoints];
    stops.forEach((s,i)=>{
      const c=clients.find(x=>x.id===s.client_id);
      if(!c?.lat||!c?.lng)return;
      waypoints.push([c.lat,c.lng]);
      allPts.push([c.lat,c.lng]);
      const done=s.status==="entregado";
      const arrived=s.arrived_at&&s.status!=="entregado";
      const isCur=i===curIdx;
      const color=done?"#10b981":arrived?"#f59e0b":isCur?(PC[s.priority]||"#6366f1"):"#94a3b8";
      const size=isCur?38:28;
      const label=done?"✓":arrived?"📍":String(i+1);
      const icon=L.divIcon({className:"",html:`<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};color:#fff;display:flex;align-items:center;justify-content:center;font-size:${isCur?14:11}px;font-weight:700;border:${isCur?"3px":"2px"} solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.3);cursor:pointer;font-family:Inter,sans-serif">${label}</div>`,iconSize:[size,size],iconAnchor:[size/2,size/2]});
      const m=L.marker([c.lat,c.lng],{icon}).addTo(map);
      m.on("click",()=>onMarkerClick&&onMarkerClick(i));
      m.bindPopup(`<div style="font-family:Inter,sans-serif;min-width:140px"><b>${c.name}</b><br><span style="font-size:11px;color:#64748b">${c.address}</span><br><span style="color:${color};font-size:11px;font-weight:600">⏰ ${s.time_limit}${done?" · ✓ Entregado":arrived?" · 📍 En parada":""}</span></div>`);
      if(isCur){
        m.openPopup();
        // Círculo de radio de llegada
        arrivedCircleRef.current=L.circle([c.lat,c.lng],{radius:ARRIVE_DIST,color:color,fillColor:color,fillOpacity:.08,weight:1.5,dashArray:"5,5"}).addTo(map);
      }
      markersRef.current.push(m);
    });

    // OSRM route
    if(waypoints.length>1){
      getOSRMRoute(waypoints).then(route=>{
        if(!route||!mapRef.current)return;
        const color=driver?.color||"#6366f1";
        routeLayerRef.current=L.polyline(route.coords,{color,weight:4,opacity:.75}).addTo(mapRef.current);
        if(allPts.length>0)mapRef.current.fitBounds(allPts,{padding:[40,40]});
      });
    } else if(allPts.length>0){
      map.fitBounds(allPts,{padding:[40,40]});
    }

    setTimeout(()=>map.invalidateSize(),100);
  },[stops,clients,curIdx,depot]);

  // Driver GPS marker
  useEffect(()=>{
    const map=mapRef.current;if(!map||!driverPos)return;
    if(driverMarkerRef.current){map.removeLayer(driverMarkerRef.current);}
    const color=driver?.color||"#6366f1";
    const icon=L.divIcon({className:"",html:`<div style="width:38px;height:38px;border-radius:50%;background:${color};border:3px solid #fff;box-shadow:0 3px 12px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:18px;animation:pulse 2s infinite">🚛</div>`,iconSize:[38,38],iconAnchor:[19,19]});
    driverMarkerRef.current=L.marker([driverPos.lat,driverPos.lng],{icon,zIndexOffset:999}).addTo(map);
  },[driverPos]);

  return <div ref={ref} style={{width:"100%",height:"100%"}}/>;
}

/* ── MAIN APP ──────────────────────────────────────────────────────────────*/
function App(){
  const [screen,setScreen]     = useState("login");
  const [loading,setLoading]   = useState(true);
  const [driver,setDriver]     = useState(null);
  const [drivers,setDrivers]   = useState([]);
  const [myStops,setMyStops]   = useState([]);
  const [clients,setClients]   = useState([]);
  const [products,setProducts] = useState([]);
  const [depot,setDepot]       = useState(null);
  const [curIdx,setCurIdx]     = useState(0);
  const [showSig,setShowSig]   = useState(false);
  const [showPanel,setShowPanel] = useState(true);
  const [note,setNote]         = useState("");
  const [toast,setToast]       = useState(null);
  const [driverPos,setDriverPos] = useState(null);

  // GPS auto-detection state
  const [nearStop,setNearStop]       = useState(null);  // stop idx del que está cerca
  const [departedStop,setDepartedStop] = useState(null); // stop que se alejó → pedir confirmación
  const arrivedRef    = useRef({});   // {stopId: true} ya marcado arrived
  const departedRef   = useRef({});   // {stopId: true} ya detectado departure

  const t_=(msg,type="ok")=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);};

  useEffect(()=>{
    async function loadAll(){
      try{
        const [d,cl,pr] = await Promise.all([
          dbGet("drivers",{},"name"),
          dbGet("clients"),
          dbGet("products",{},"name"),
        ]);
        console.log("drivers:",d.data?.length, d.error);
        console.log("clients:",cl.data?.length, cl.error);
        console.log("products:",pr.data?.length, pr.error);
        if(d.data)setDrivers(d.data);
        if(cl.data)setClients(cl.data);
        if(pr.data)setProducts(pr.data);
      }catch(e){
        console.error("Error cargando datos:",e);
      }
      // Depot — con fallback a localStorage si config no existe
      try{
        const{data,error}=await dbGet("config",{key:"depot"});
        console.log("config depot:",data,error);
        if(data&&data[0]?.value&&data[0].value.address){
          setDepot(data[0].value);
        } else {
          const local=JSON.parse(localStorage.getItem("cachofer_depot")||"{}");
          if(local?.address)setDepot(local);
        }
      }catch(e){
        console.log("Config no disponible, usando localStorage:",e);
        try{const dep=JSON.parse(localStorage.getItem("cachofer_depot")||"{}");if(dep?.address)setDepot(dep);}catch{}
      }
      setLoading(false);
    }
    loadAll();
  },[]);

  async function loadStops(driverId){
    const{data}=await dbGet("stops",{driver_id:driverId,work_date:todayStr()},"route_order");
    if(data)setMyStops(data);
    return data||[];
  }

  async function selectDriver(dr){
    setDriver(dr);
    const stops=await loadStops(dr.id);
    const first=stops.findIndex(s=>s.status!=="entregado");
    setCurIdx(first>=0?first:0);
    setScreen("map");
  }

  // GPS watch: posición + detección automática
  useEffect(()=>{
    if(!driver||screen==="login")return;
    if(!navigator.geolocation)return;

    let lastGPSSend=0;

    const id=navigator.geolocation.watchPosition(async pos=>{
      const{latitude:lat,longitude:lng}=pos.coords;
      setDriverPos({lat,lng});

      // Enviar a Supabase cada 15s
      const now=Date.now();
      if(now-lastGPSSend>15000){
        lastGPSSend=now;
        await dbUpdate("drivers",{current_lat:lat,current_lng:lng,location_updated_at:new Date().toISOString(),status:"en_ruta"},"id",driver.id);
        setDriver(p=>({...p,current_lat:lat,current_lng:lng}));
      }

      // Detección de proximidad a paradas
      setMyStops(currentStops=>{
        currentStops.forEach(async(s,i)=>{
          if(s.status==="entregado")return;
          const c=clients.find(x=>x.id===s.client_id);
          if(!c?.lat||!c?.lng)return;
          const dist=haversine(lat,lng,c.lat,c.lng);

          // LLEGADA: < 50m y no marcado aún
          if(dist<ARRIVE_DIST&&!arrivedRef.current[s.id]&&!s.arrived_at){
            arrivedRef.current[s.id]=true;
            const now=new Date().toISOString();
            await dbUpdate("stops",{arrived_at:now},"id",s.id);
            setMyStops(prev=>prev.map(x=>x.id===s.id?{...x,arrived_at:now}:x));
            setNearStop(i);
            t_(`📍 Llegaste a ${c.name}`,"arrive");
          }

          // PARTIDA: > 150m habiendo llegado antes → pedir confirmación
          if(dist>DEPART_DIST&&arrivedRef.current[s.id]&&!departedRef.current[s.id]&&s.status!=="entregado"){
            departedRef.current[s.id]=true;
            const deptTime=new Date().toISOString();
            await dbUpdate("stops",{departure_at:deptTime},"id",s.id);
            setMyStops(prev=>prev.map(x=>x.id===s.id?{...x,departure_at:deptTime}:x));
            setDepartedStop(i);
          }
        });
        return currentStops;
      });
    },err=>{console.log("GPS:",err.message);},{enableHighAccuracy:true,maximumAge:5000,timeout:15000});

    return()=>navigator.geolocation.clearWatch(id);
  },[driver,screen,clients]);

  // Realtime: recarga cuando el admin cambia la ruta
  useEffect(()=>{
    if(!driver||screen==="login")return;

    // Polling cada 60 minutos (backup)
    const iv=setInterval(()=>{
      loadStops(driver.id);
      t_("🔄 Ruta actualizada");
    },60*60*1000);

    // Supabase Realtime via polling rápido cada 10s
    // (sin SDK, usamos polling frecuente como sustituto)
    const rt=setInterval(async()=>{
      const{data}=await dbGet("stops",{driver_id:driver.id,work_date:todayStr()},"route_order");
      if(!data)return;
      // Solo actualizar si hay cambios reales
      setMyStops(prev=>{
        const prevIds=prev.map(s=>s.id+s.status+s.route_order).join();
        const newIds=data.map(s=>s.id+s.status+s.route_order).join();
        if(prevIds!==newIds){
          // Hay cambios — notificar
          const newStops=data.filter(s=>!prev.find(p=>p.id===s.id));
          const removedStops=prev.filter(s=>!data.find(d=>d.id===s.id));
          if(newStops.length>0)t_(`📦 +${newStops.length} parada${newStops.length>1?"s":""} nueva${newStops.length>1?"s":""}!`);
          if(removedStops.length>0)t_(`🗑 Se eliminó una parada`);
          return data;
        }
        return prev;
      });
    },10000);

    return()=>{clearInterval(iv);clearInterval(rt);};
  },[driver,screen]);

  async function confirmDelivery(sig,stopIdx=curIdx){
    const stop=myStops[stopIdx];
    const now=new Date().toISOString();
    const timeMin=stop.arrived_at?Math.round((new Date(now)-new Date(stop.arrived_at))/60000):null;
    await dbUpdate("stops",{
      status:"entregado",signature:sig||null,
      delivery_note:note,delivered_at:now,
      time_at_stop_minutes:timeMin
    },"id",stop.id);
    const updated=myStops.map((s,i)=>i===stopIdx?{...s,status:"entregado",delivered_at:now}:s);
    setMyStops(updated);
    setShowSig(false);setNote("");setDepartedStop(null);setNearStop(null);
    t_("✓ Entrega confirmada");
    setTimeout(()=>{
      const next=updated.findIndex((s,i)=>i>stopIdx&&s.status!=="entregado");
      if(next>=0)setCurIdx(next);
      else{const any=updated.findIndex(s=>s.status!=="entregado");any>=0?setCurIdx(any):setScreen("done");}
    },800);
  }

  async function skipDelivery(stopIdx){
    // Marcar que se alejó pero no confirmar — solo cerrar el aviso
    setDepartedStop(null);
    t_("Podés confirmar manualmente más tarde");
  }

  const cur=myStops[curIdx];
  const curClient=cur?clients.find(x=>x.id===cur.client_id)||{}:{};
  const prods=cur?(cur.products||[]).map(p=>{const pr=products.find(x=>x.id===p.productId);return pr?`${pr.name} ×${p.qty}`:""}).filter(Boolean).join(" · "):""
  const pending=myStops.filter(s=>s.status!=="entregado").length;
  const delivered=myStops.filter(s=>s.status==="entregado").length;

  /* ── LOGIN ──────────────────────────────────────────────────────────────*/
  if(loading)return(
    <div style={{height:"100%",background:"#fff",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <Spinner/><div style={{fontSize:13,color:"#94a3b8"}}>Conectando…</div>
    </div>
  );

  if(screen==="login")return(
    <div style={{height:"100%",background:"#fff",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"36px 24px 22px",borderBottom:"1px solid #f1f5f9"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
          <img src="icon-192.png" style={{width:46,height:46,borderRadius:12}} alt="" onError={e=>e.target.style.display="none"}/>
          <div>
            <div style={{fontSize:22,fontWeight:800,letterSpacing:-.5}}>CA-<span style={{color:"#f97316"}}>Chofer</span></div>
            <div style={{fontSize:11,color:"#94a3b8",letterSpacing:.5,textTransform:"uppercase"}}>App del Chofer v7</div>
          </div>
        </div>
        <div style={{fontSize:14,color:"#64748b"}}>Seleccioná tu nombre para ver tu ruta de hoy</div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>
        {drivers.length===0&&<div style={{textAlign:"center",color:"#cbd5e1",fontSize:13,marginTop:40,lineHeight:1.7}}>Sin choferes registrados.</div>}
        {drivers.map(dr=>(
          <button key={dr.id} onClick={()=>selectDriver(dr)}
            style={{width:"100%",display:"flex",alignItems:"center",gap:14,padding:"14px 16px",borderRadius:14,border:"1.5px solid #f1f5f9",background:"#fff",marginBottom:10,textAlign:"left"}}>
            <div style={{width:52,height:52,borderRadius:14,background:dr.color||"#6366f1",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:17,fontWeight:700,flexShrink:0}}>{dr.avatar}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:16,fontWeight:600,marginBottom:3}}>{dr.name}</div>
              <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"#94a3b8"}}>
                <span style={{width:7,height:7,borderRadius:"50%",background:dr.status==="en_ruta"?"#10b981":"#cbd5e1",display:"inline-block"}}/>
                {dr.status==="en_ruta"?"En ruta":"Disponible"}
                {dr.phone&&<><span style={{color:"#e2e8f0"}}>·</span><span>{dr.phone}</span></>}
              </div>
            </div>
            <span style={{fontSize:18,color:"#e2e8f0"}}>→</span>
          </button>
        ))}
      </div>
      <div style={{padding:"10px 20px 24px",borderTop:"1px solid #f1f5f9",textAlign:"center"}}>
        <div style={{fontSize:11,color:"#cbd5e1"}}>Detección automática de llegada · CA-Chofer v7</div>
      </div>
    </div>
  );

  /* ── DONE ───────────────────────────────────────────────────────────────*/
  if(screen==="done")return(
    <div style={{height:"100%",background:"#fff",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:24}}>
      <div style={{fontSize:72}}>🎉</div>
      <div style={{fontSize:26,fontWeight:800,color:"#10b981",letterSpacing:-.5}}>¡Ruta completada!</div>
      <div style={{background:"#f0fdf4",border:"1.5px solid #bbf7d0",borderRadius:14,padding:"18px 44px",textAlign:"center"}}>
        <div style={{fontSize:44,fontWeight:800,color:"#10b981"}}>{myStops.length}</div>
        <div style={{fontSize:11,color:"#64748b",letterSpacing:1,textTransform:"uppercase"}}>Entregas realizadas</div>
      </div>
      <button onClick={()=>{setScreen("login");setDriver(null);setMyStops([]);}} style={{marginTop:12,padding:"10px 24px",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#fff",fontSize:13,fontWeight:500,color:"#64748b"}}>Cerrar sesión</button>
    </div>
  );

  /* ── MAP SCREEN ─────────────────────────────────────────────────────────*/
  if(screen==="map")return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#000",position:"relative"}}>

      {/* Header */}
      <div style={{height:48,background:"#111",display:"flex",alignItems:"center",padding:"0 14px",gap:10,flexShrink:0,zIndex:10}}>
        <div style={{width:32,height:32,borderRadius:9,background:driver.color||"#6366f1",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,fontWeight:700,flexShrink:0}}>{driver.avatar}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12,fontWeight:600,color:"#fff",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{driver.name}</div>
          <div style={{fontSize:10,color:"#555"}}>{delivered}/{myStops.length} entregas · {pending} pendientes</div>
        </div>
        {/* Progress dots */}
        <div style={{display:"flex",gap:4,flexShrink:0,flexWrap:"nowrap",overflowX:"auto",maxWidth:"50%"}}>
          {myStops.map((s,i)=>{
            const done=s.status==="entregado";
            const arrived=s.arrived_at&&!done;
            const isCur=i===curIdx;
            const bg=done?"#10b981":arrived?"#f59e0b":isCur?(PC[s.priority]||"#6366f1"):"#333";
            const sz=isCur?20:done?18:14;
            return(
              <div key={s.id} onClick={()=>setCurIdx(i)}
                style={{width:sz,height:sz,borderRadius:"50%",background:bg,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:700,cursor:"pointer",transition:"all .2s",border:isCur?"2px solid #fff":"none",flexShrink:0}}>
                {done?"✓":arrived?"·":i+1}
              </div>
            );
          })}
        </div>
      </div>

      {/* Map */}
      <div style={{flex:1,position:"relative"}}>
        <RouteMap stops={myStops} clients={clients} curIdx={curIdx} driver={driver} depot={depot} driverPos={driverPos} onMarkerClick={i=>setCurIdx(i)}/>
      </div>

      {/* Panel inferior */}
      <div style={{background:"#fff",borderRadius:"18px 18px 0 0",boxShadow:"0 -4px 20px rgba(0,0,0,0.15)",flexShrink:0,zIndex:10,maxHeight:showPanel?"68%":"auto",overflowY:"auto"}}>
        <div onClick={()=>setShowPanel(p=>!p)} style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"10px 0 6px",cursor:"pointer",flexShrink:0}}>
          <div style={{width:36,height:4,borderRadius:4,background:"#e2e8f0",marginBottom:4}}/>
          {!showPanel&&cur&&(
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"4px 16px 2px",width:"100%"}}>
              <PTag p={cur.priority}/>
              <span style={{fontSize:13,fontWeight:600,flex:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{curClient.name||"—"}</span>
              <span style={{fontSize:12,color:PC[cur.priority],fontWeight:600}}>⏰ {cur.time_limit}</span>
            </div>
          )}
        </div>

        {showPanel&&cur&&cur.status!=="entregado"&&(
          <div style={{padding:"0 14px 24px"}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:12}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
                  <PTag p={cur.priority}/>
                  <span style={{fontSize:11,color:"#94a3b8"}}>⏰ {cur.time_limit}</span>
                  <span style={{fontSize:11,color:"#94a3b8"}}>#{curIdx+1}/{myStops.length}</span>
                  {cur.arrived_at&&<span style={{fontSize:10,fontWeight:600,color:"#f59e0b",background:"#fffbeb",padding:"1px 6px",borderRadius:10}}>📍 En parada</span>}
                </div>
                <div style={{fontSize:16,fontWeight:700,marginBottom:2}}>{curClient.name||"—"}</div>
                <div style={{fontSize:12,color:"#64748b",marginBottom:curClient.notes?4:0}}>{curClient.address}</div>
                {curClient.notes&&<div style={{fontSize:11,color:"#94a3b8",background:"#f8fafc",padding:"4px 8px",borderRadius:6,marginTop:4}}>📝 {curClient.notes}</div>}
              </div>
              {curClient.phone&&<a href={`tel:${curClient.phone}`} style={{width:42,height:42,borderRadius:12,background:"#f0fdf4",border:"1px solid #bbf7d0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,textDecoration:"none",flexShrink:0}}>📞</a>}
            </div>
            {prods&&<div style={{background:"#f8fafc",borderRadius:10,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#6366f1"}}>📦 {prods}</div>}
            {cur.arrived_at&&(
              <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:10,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#92400e",display:"flex",alignItems:"center",gap:6}}>
                📍 Llegaste a las {new Date(cur.arrived_at).toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"})}
              </div>
            )}
            <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Observación opcional…"
              style={{width:"100%",border:"1.5px solid #e2e8f0",borderRadius:10,padding:"10px 12px",fontSize:13,outline:"none",resize:"none",height:56,color:"#111",marginBottom:12}}/>
            <button onClick={()=>setShowSig(true)}
              style={{width:"100%",background:"#10b981",border:"none",borderRadius:13,padding:"16px",fontSize:16,fontWeight:700,color:"#fff",cursor:"pointer",boxShadow:"0 4px 16px rgba(16,185,129,0.3)"}}>
              ✓ Producto entregado
            </button>
            {myStops.length>1&&(
              <div style={{display:"flex",gap:8,marginTop:10}}>
                <button onClick={()=>setCurIdx(Math.max(0,curIdx-1))} disabled={curIdx===0} style={{flex:1,padding:"10px",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#fff",fontSize:13,fontWeight:500,color:"#64748b",opacity:curIdx===0?.4:1}}>← Anterior</button>
                <button onClick={()=>{const n=myStops.findIndex((s,i)=>i>curIdx&&s.status!=="entregado");if(n>=0)setCurIdx(n);}} disabled={!myStops.find((s,i)=>i>curIdx&&s.status!=="entregado")} style={{flex:1,padding:"10px",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#fff",fontSize:13,fontWeight:500,color:"#64748b"}}>Siguiente →</button>
              </div>
            )}
          </div>
        )}

        {showPanel&&cur&&cur.status==="entregado"&&(
          <div style={{padding:"12px 14px 24px",textAlign:"center"}}>
            <div style={{fontSize:28,marginBottom:6}}>✅</div>
            <div style={{fontSize:14,fontWeight:600,color:"#10b981"}}>Entregado en {curClient.name}</div>
            {pending>0&&<button onClick={()=>{const n=myStops.findIndex((s,i)=>i>curIdx&&s.status!=="entregado");if(n>=0)setCurIdx(n);}} style={{marginTop:10,padding:"10px 20px",borderRadius:10,border:"none",background:"#111",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}}>Ir al siguiente →</button>}
          </div>
        )}

        {showPanel&&pending===0&&(
          <div style={{padding:"16px 14px 28px",textAlign:"center"}}>
            <div style={{fontSize:32,marginBottom:8}}>🎉</div>
            <div style={{fontSize:16,fontWeight:700,color:"#10b981"}}>¡Todas las entregas completadas!</div>
            <button onClick={()=>setScreen("done")} style={{marginTop:12,padding:"10px 24px",borderRadius:10,border:"none",background:"#10b981",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}}>Ver resumen</button>
          </div>
        )}
      </div>

      {/* ALERTA GPS: Se alejó sin confirmar */}
      {departedStop!==null&&myStops[departedStop]&&myStops[departedStop].status!=="entregado"&&(()=>{
        const s=myStops[departedStop];
        const c=clients.find(x=>x.id===s.client_id)||{};
        return(
          <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"calc(100% - 20px)",maxWidth:460,background:"#fff",borderRadius:"16px 16px 0 0",boxShadow:"0 -8px 32px rgba(0,0,0,0.25)",zIndex:500,padding:"20px 18px 32px",animation:"bounceIn .3s ease"}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:4,color:"#f97316"}}>⚠️ ¿Confirmás la entrega?</div>
            <div style={{fontSize:14,fontWeight:600,marginBottom:2}}>{c.name}</div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:16}}>Detectamos que te alejaste sin confirmar esta parada.</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>skipDelivery(departedStop)} style={{flex:1,padding:"12px",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#fff",fontSize:13,fontWeight:500,color:"#64748b"}}>No entregué</button>
              <button onClick={()=>{setCurIdx(departedStop);setShowSig(true);}} style={{flex:2,padding:"12px",borderRadius:10,border:"none",background:"#10b981",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>✓ Sí, confirmar entrega</button>
            </div>
          </div>
        );
      })()}

      {showSig&&<SigPad onCapture={sig=>confirmDelivery(sig)} onCancel={()=>setShowSig(false)}/>}
      {toast&&<div style={{position:"fixed",top:60,left:"50%",transform:"translateX(-50%)",background:toast.type==="arrive"?"#f59e0b":toast.type==="ok"?"#10b981":"#ef4444",color:"#fff",padding:"10px 22px",borderRadius:10,fontSize:13,fontWeight:600,zIndex:500,animation:"slideDown .25s ease",whiteSpace:"nowrap"}}>{toast.msg}</div>}
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
